<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090514" />
      <stop offset="50%" stop-color="#180e29" />
      <stop offset="100%" stop-color="#05030a" />
    </linearGradient>

    <!-- Orange Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ffae00" />
    </linearGradient>

    <!-- Hot Pink / Purple Gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2e93" />
      <stop offset="100%" stop-color="#a000ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Background decorative light beams -->
  <circle cx="150" cy="150" r="180" fill="#ff7b00" opacity="0.08" filter="url(#glow)" />
  <circle cx="650" cy="350" r="220" fill="#a000ff" opacity="0.08" filter="url(#glow)" />

  <!-- LEFT: The Spreadsheet Metaphor (Legacy, outdated) -->
  <g transform="translate(80, 120)">
    <!-- Base Board -->
    <rect x="0" y="0" width="260" height="240" rx="12" fill="#13101c" stroke="#ff7b00" stroke-opacity="0.3" stroke-width="1" />
    <!-- Browser Top Bar -->
    <rect x="0" y="0" width="260" height="30" rx="12" fill="#201a30" />
    <circle cx="20" cy="15" r="4" fill="#ff5f56" />
    <circle cx="35" cy="15" r="4" fill="#ffbd2e" />
    <circle cx="50" cy="15" r="4" fill="#27c93f" />
    <text x="130" y="20" fill="#665b85" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">spreadsheets_final_v4.xlsx</text>

    <!-- Grid Columns & Rows -->
    <g opacity="0.25">
      <!-- Headers -->
      <rect x="15" y="45" width="45" height="15" fill="#ff7b00" opacity="0.3" />
      <rect x="65" y="45" width="55" height="15" fill="#ff7b00" opacity="0.3" />
      <rect x="125" y="45" width="55" height="15" fill="#ff7b00" opacity="0.3" />
      <rect x="185" y="45" width="60" height="15" fill="#ff7b00" opacity="0.3" />
      <!-- Spreadsheet Grid lines -->
      <line x1="15" y1="45" x2="245" y2="45" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="65" x2="245" y2="65" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="85" x2="245" y2="85" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="105" x2="245" y2="105" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="125" x2="245" y2="125" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="145" x2="245" y2="145" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="165" x2="245" y2="165" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="185" x2="245" y2="185" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="205" x2="245" y2="205" stroke="#ffffff" stroke-width="1" />
      <line x1="15" y1="225" x2="245" y2="225" stroke="#ffffff" stroke-width="1" />

      <line x1="15" y1="45" x2="15" y2="225" stroke="#ffffff" stroke-width="1" />
      <line x1="60" y1="45" x2="60" y2="225" stroke="#ffffff" stroke-width="1" />
      <line x1="120" y1="45" x2="120" y2="225" stroke="#ffffff" stroke-width="1" />
      <line x1="180" y1="45" x2="180" y2="225" stroke="#ffffff" stroke-width="1" />
      <line x1="245" y1="45" x2="245" y2="225" stroke="#ffffff" stroke-width="1" />
    </g>
    <!-- Warning exclamation mark showing limit reached -->
    <circle cx="130" cy="135" r="28" fill="#ff7b00" fill-opacity="0.1" stroke="url(#orangeGrad)" stroke-width="1.5" stroke-dasharray="4,2" />
    <path d="M130 120 L130 138 M130 146 L130 148" stroke="url(#orangeGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)" />
  </g>

  <!-- Transformation Flow Arrow -->
  <g filter="url(#glow)" opacity="0.8">
    <path d="M 370 240 L 400 240 L 400 230 L 420 250 L 400 270 L 400 260 L 370 260 Z" fill="url(#orangeGrad)" />
  </g>

  <!-- RIGHT: Custom Software Dashboard (Modern, efficient) -->
  <g transform="translate(440, 100)">
    <!-- Base Board -->
    <rect x="0" y="0" width="280" height="280" rx="16" fill="#151126" stroke="url(#pinkGrad)" stroke-width="2" filter="url(#glow)" />
    <!-- Top Bar -->
    <rect x="0" y="0" width="280" height="35" rx="16" fill="#241b3d" />
    <circle cx="20" cy="18" r="4.5" fill="#ff5f56" />
    <circle cx="35" cy="18" r="4.5" fill="#ffbd2e" />
    <circle cx="50" cy="18" r="4.5" fill="#27c93f" />
    <text x="80" y="22" fill="#a000ff" font-family="'Inter', sans-serif" font-size="11" font-weight="bold">BLUKITS DASHBOARD</text>

    <!-- Modern KPI Widget 1: Radial Progress -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="110" height="100" rx="10" fill="#201a38" />
      <circle cx="55" cy="45" r="28" fill="none" stroke="#2b224a" stroke-width="6" />
      <circle cx="55" cy="45" r="28" fill="none" stroke="url(#pinkGrad)" stroke-width="6" stroke-dasharray="175" stroke-dashoffset="40" stroke-linecap="round" />
      <text x="55" y="49" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">82%</text>
      <text x="55" y="85" fill="#9f93c5" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle" letter-spacing="0.5">EFFICIENCY</text>
    </g>

    <!-- Modern KPI Widget 2: Sales Chart -->
    <g transform="translate(150, 55)">
      <rect x="0" y="0" width="110" height="100" rx="10" fill="#201a38" />
      <path d="M 15 75 Q 35 30 55 55 T 95 25" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
      <circle cx="95" cy="25" r="4.5" fill="#ffffff" filter="url(#glow)" />
      <text x="55" y="85" fill="#9f93c5" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle" letter-spacing="0.5">GROWTH TREND</text>
    </g>

    <!-- Modern KPI Widget 3: Data Pipelines -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="240" height="85" rx="10" fill="#201a38" />
      <!-- Workflow nodes -->
      <line x1="40" y1="42" x2="200" y2="42" stroke="#2b224a" stroke-width="3" />
      <line x1="40" y1="42" x2="120" y2="42" stroke="url(#pinkGrad)" stroke-width="3" />
      <circle cx="40" cy="42" r="8" fill="url(#pinkGrad)" />
      <circle cx="120" cy="42" r="8" fill="url(#orangeGrad)" />
      <circle cx="200" cy="42" r="8" fill="#2b224a" />
      
      <text x="40" y="68" fill="#9f93c5" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Input</text>
      <text x="120" y="68" fill="#9f93c5" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Process</text>
      <text x="200" y="68" fill="#9f93c5" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Output</text>
    </g>
  </g>
</svg>
