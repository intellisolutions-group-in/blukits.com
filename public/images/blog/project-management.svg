<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0714" />
      <stop offset="50%" stop-color="#150e29" />
      <stop offset="100%" stop-color="#04020a" />
    </linearGradient>

    <!-- Glowing Yellow/Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd200" />
      <stop offset="100%" stop-color="#ff7e00" />
    </linearGradient>

    <!-- Glowing Purple/Magenta Gradient -->
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f300ff" />
      <stop offset="100%" stop-color="#8a00ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Background light splash -->
  <circle cx="200" cy="200" r="180" fill="#ffd200" opacity="0.05" filter="url(#glow)" />
  <circle cx="600" cy="300" r="180" fill="#8a00ff" opacity="0.05" filter="url(#glow)" />

  <!-- The Process Timeline Curve -->
  <g opacity="0.2">
    <path d="M100 250 Q 250 100 400 250 T 700 250" fill="none" stroke="url(#magentaGrad)" stroke-width="3" stroke-dasharray="10,5" />
  </g>

  <!-- Roadmap Path Grid & Cards -->
  <!-- Step 1: Planning (Successful) -->
  <g transform="translate(100, 150)" filter="url(#glow)">
    <rect width="160" height="90" rx="12" fill="#130d22" stroke="url(#goldGrad)" stroke-width="2" />
    <circle cx="28" cy="30" r="12" fill="#ffd200" fill-opacity="0.2" />
    <!-- Checkmark icon -->
    <path d="M 22 30 L 26 34 L 34 26" fill="none" stroke="#ffd200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="50" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">Discovery</text>
    <text x="20" y="66" fill="#9e93b5" font-family="'Inter', sans-serif" font-size="10">Clear Scope &amp; Target</text>
  </g>

  <!-- Connection line 1 -> 2 -->
  <path d="M 260 195 C 290 195, 290 285, 320 285" fill="none" stroke="url(#magentaGrad)" stroke-width="2" stroke-dasharray="6,4" />

  <!-- Step 2: Risk / Scope Creep (Warning Area) -->
  <g transform="translate(320, 240)" filter="url(#glow)">
    <rect width="160" height="90" rx="12" fill="#130d22" stroke="#ff3b30" stroke-width="1.5" />
    <circle cx="28" cy="30" r="12" fill="#ff3b30" fill-opacity="0.2" />
    <!-- Warning sign icon -->
    <path d="M 28 22 L 28 32 M 28 36 L 28 38" fill="none" stroke="#ff3b30" stroke-width="2.5" stroke-linecap="round" />
    <text x="50" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">Scope Creep</text>
    <text x="20" y="66" fill="#9e93b5" font-family="'Inter', sans-serif" font-size="10">Unchecked Changes</text>
  </g>

  <!-- Connection line 2 -> 3 -->
  <path d="M 480 285 C 510 285, 510 195, 540 195" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="6,4" />

  <!-- Step 3: Success Checklist -->
  <g transform="translate(540, 150)" filter="url(#glow)">
    <rect width="160" height="90" rx="12" fill="#130d22" stroke="url(#goldGrad)" stroke-width="2" />
    <circle cx="28" cy="30" r="12" fill="#ffd200" fill-opacity="0.2" />
    <!-- Checkmark icon -->
    <path d="M 22 30 L 26 34 L 34 26" fill="none" stroke="#ffd200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="50" y="34" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">Delivery</text>
    <text x="20" y="66" fill="#9e93b5" font-family="'Inter', sans-serif" font-size="10">Testing &amp; QA Check</text>
  </g>

  <!-- Floating particles -->
  <circle cx="270" cy="110" r="3" fill="#ffd200" opacity="0.6" />
  <circle cx="510" cy="380" r="3.5" fill="#f300ff" opacity="0.6" filter="url(#glow)" />
  <circle cx="150" cy="380" r="4.5" fill="#ffd200" opacity="0.4" />
</svg>
