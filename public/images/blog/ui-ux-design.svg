<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070314" />
      <stop offset="50%" stop-color="#14082c" />
      <stop offset="100%" stop-color="#03010b" />
    </linearGradient>

    <!-- Glowing Yellow/Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb300" />
      <stop offset="100%" stop-color="#ff4f00" />
    </linearGradient>

    <!-- Glowing Hot Pink Gradient -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a85" />
      <stop offset="100%" stop-color="#b000ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Background light splash -->
  <circle cx="280" cy="200" r="180" fill="#ff2a85" opacity="0.05" filter="url(#glow)" />
  <circle cx="520" cy="300" r="180" fill="#ffb300" opacity="0.05" filter="url(#glow)" />

  <!-- The UX Grid & Guidelines (Abstract Design Draft) -->
  <g opacity="0.15" stroke="url(#pinkGrad)" stroke-width="0.75">
    <line x1="100" y1="100" x2="700" y2="400" />
    <line x1="700" y1="100" x2="100" y2="400" />
    <circle cx="400" cy="250" r="150" fill="none" />
    <circle cx="400" cy="250" r="220" fill="none" stroke-dasharray="4,6" />
  </g>

  <!-- Wireframe Browser Interface -->
  <g transform="translate(180, 100)" filter="url(#glow)">
    <rect width="440" height="280" rx="16" fill="#130e26" stroke="url(#pinkGrad)" stroke-width="2" />
    
    <!-- Header top bar -->
    <rect width="440" height="35" rx="16" fill="#201538" />
    <circle cx="20" cy="18" r="4.5" fill="#ff5f56" />
    <circle cx="35" cy="18" r="4.5" fill="#ffbd2e" />
    <circle cx="50" cy="18" r="4.5" fill="#27c93f" />
    
    <!-- Layout Sections -->
    <!-- Side Nav -->
    <rect x="15" y="50" width="80" height="210" rx="8" fill="#1b1235" opacity="0.8" />
    <rect x="25" y="65" width="60" height="8" rx="2" fill="url(#pinkGrad)" />
    <rect x="25" y="85" width="60" height="8" rx="2" fill="#2b1c53" />
    <rect x="25" y="105" width="60" height="8" rx="2" fill="#2b1c53" />
    
    <!-- Hero Block -->
    <rect x="110" y="50" width="315" height="110" rx="8" fill="#1b1235" opacity="0.8" />
    <!-- Inner Call-to-action button (Aesthetic yellow focus button) -->
    <rect x="130" y="110" width="100" height="28" rx="6" fill="url(#goldGrad)" />
    <circle cx="370" cy="105" r="25" fill="#ff2a85" fill-opacity="0.1" stroke="url(#pinkGrad)" stroke-width="1.5" />
    <!-- User Avatar wireframe -->
    <circle cx="370" cy="100" r="10" fill="url(#pinkGrad)" />
    <path d="M 355 120 Q 370 110 385 120" fill="none" stroke="url(#pinkGrad)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Content Cards below -->
    <rect x="110" y="175" width="145" height="85" rx="8" fill="#1b1235" opacity="0.8" />
    <circle cx="135" cy="205" r="12" fill="#ff2a85" opacity="0.2" />
    <rect x="160" y="195" width="80" height="6" rx="2" fill="#2b1c53" />
    <rect x="160" y="210" width="60" height="6" rx="2" fill="#2b1c53" />

    <rect x="270" y="175" width="155" height="85" rx="8" fill="#1b1235" opacity="0.8" />
    <circle cx="295" cy="205" r="12" fill="#ffb300" opacity="0.2" />
    <rect x="320" y="195" width="85" height="6" rx="2" fill="#2b1c53" />
    <rect x="320" y="210" width="65" height="6" rx="2" fill="#2b1c53" />
  </g>

  <!-- Glowing Pointer Cursor clicking the CTA button -->
  <g transform="translate(390, 215)" filter="url(#glow)">
    <!-- Touch wave ring -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-opacity="0.8">
      <animate attributeName="r" values="8;24;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Pointer cursor -->
    <path d="M -2 -2 L 18 8 L 8 12 L 12 22 Z" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linejoin="round" />
  </g>

  <!-- Tech sparkles -->
  <circle cx="140" cy="140" r="4.5" fill="#ff2a85" filter="url(#glow)" />
  <circle cx="660" cy="360" r="4.5" fill="#ffb300" filter="url(#glow)" />
</svg>
