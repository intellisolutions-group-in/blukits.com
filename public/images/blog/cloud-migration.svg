<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020914" />
      <stop offset="50%" stop-color="#0b172a" />
      <stop offset="100%" stop-color="#01040a" />
    </linearGradient>

    <!-- Glowing Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing Violet Gradient -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d5573b" />
      <stop offset="100%" stop-color="#833ab4" />
    </linearGradient>

    <linearGradient id="bluePurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#8a00ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Background Light Glows -->
  <circle cx="400" cy="180" r="160" fill="#00f2fe" opacity="0.05" filter="url(#glow)" />
  <circle cx="400" cy="360" r="140" fill="#833ab4" opacity="0.05" filter="url(#glow)" />

  <!-- Upload Lines (Abstract Data Flow) -->
  <g stroke="url(#cyanGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <!-- Curved Left line -->
    <path d="M 280 340 C 280 260, 360 240, 370 210" fill="none" stroke-dasharray="6,4" />
    <!-- Center Line -->
    <line x1="400" y1="320" x2="400" y2="215" stroke-dasharray="8,5" />
    <!-- Curved Right line -->
    <path d="M 520 340 C 520 260, 440 240, 430 210" fill="none" stroke-dasharray="6,4" />
  </g>

  <!-- BOTTOM: Local Databases / Servers -->
  <g transform="translate(180, 320)">
    <!-- Server 1 -->
    <g transform="translate(0, 0)">
      <rect width="110" height="70" rx="8" fill="#111827" stroke="#22d3ee" stroke-width="1" opacity="0.8" />
      <line x1="10" y1="20" x2="100" y2="20" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="20" r="3" fill="#22d3ee" filter="url(#glow)" />
      <line x1="10" y1="35" x2="100" y2="35" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="35" r="3" fill="#22d3ee" filter="url(#glow)" />
      <line x1="10" y1="50" x2="100" y2="50" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="50" r="3" fill="#1f2937" />
    </g>

    <!-- Server 2 -->
    <g transform="translate(160, 0)">
      <rect width="110" height="70" rx="8" fill="#111827" stroke="#8b5cf6" stroke-width="1" opacity="0.8" />
      <line x1="10" y1="20" x2="100" y2="20" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="20" r="3" fill="#8b5cf6" filter="url(#glow)" />
      <line x1="10" y1="35" x2="100" y2="35" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="35" r="3" fill="#8b5cf6" filter="url(#glow)" />
      <line x1="10" y1="50" x2="100" y2="50" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="50" r="3" fill="#1f2937" />
    </g>

    <!-- Server 3 -->
    <g transform="translate(320, 0)">
      <rect width="110" height="70" rx="8" fill="#111827" stroke="#22d3ee" stroke-width="1" opacity="0.8" />
      <line x1="10" y1="20" x2="100" y2="20" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="20" r="3" fill="#22d3ee" filter="url(#glow)" />
      <line x1="10" y1="35" x2="100" y2="35" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="35" r="3" fill="#1f2937" />
      <line x1="10" y1="50" x2="100" y2="50" stroke="#1f2937" stroke-width="6" stroke-linecap="round" />
      <circle cx="20" cy="50" r="3" fill="#22d3ee" filter="url(#glow)" />
    </g>
  </g>

  <!-- TOP: The Cloud Node -->
  <g transform="translate(300, 70)" filter="url(#glow)">
    <!-- Cloud base shape -->
    <path d="M 50 120 
             A 30 30 0 0 1 80 90 
             A 45 45 0 0 1 150 75 
             A 35 35 0 0 1 190 120 
             A 25 25 0 0 1 180 145 
             L 50 145 
             A 25 25 0 0 1 50 120 Z" 
          fill="#1e1b4b" 
          stroke="url(#bluePurple)" 
          stroke-width="3" />
    <!-- Glowing Database inside Cloud -->
    <g transform="translate(95, 95)" opacity="0.9">
      <ellipse cx="25" cy="12" rx="20" ry="6" fill="none" stroke="#22d3ee" stroke-width="2" />
      <path d="M 5 12 L 5 22 A 20 6 0 0 0 45 22 L 45 12" fill="none" stroke="#22d3ee" stroke-width="2" />
      <path d="M 5 22 L 5 32 A 20 6 0 0 0 45 32 L 45 22" fill="none" stroke="#22d3ee" stroke-width="2" />
      <circle cx="12" cy="18" r="2" fill="#22d3ee" filter="url(#glow)" />
      <circle cx="12" cy="28" r="2" fill="#8b5cf6" filter="url(#glow)" />
    </g>
  </g>

  <!-- Flying Upload Packets -->
  <circle cx="295" cy="280" r="4.5" fill="#22d3ee" filter="url(#glow)" />
  <circle cx="400" cy="260" r="5" fill="#8b5cf6" filter="url(#glow)" />
  <circle cx="505" cy="290" r="4" fill="#22d3ee" filter="url(#glow)" />
  <circle cx="390" cy="170" r="5" fill="#22d3ee" filter="url(#glow)" />
</svg>
