<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c14" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <!-- Glowing Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Abstract Tech Grid Lines -->
  <g opacity="0.3">
    <path d="M100 250 L700 250" stroke="url(#blueGrad)" stroke-width="1.5" stroke-dasharray="8,8" />
    <path d="M250 100 L250 400" stroke="url(#purpleGrad)" stroke-width="1" stroke-dasharray="5,5" />
    <path d="M550 100 L550 400" stroke="url(#blueGrad)" stroke-width="1" stroke-dasharray="5,5" />
    <circle cx="250" cy="250" r="120" fill="none" stroke="url(#blueGrad)" stroke-width="0.75" />
    <circle cx="550" cy="250" r="120" fill="none" stroke="url(#purpleGrad)" stroke-width="0.75" />
  </g>

  <!-- Connection Nodes / Wiring -->
  <g filter="url(#glow)">
    <path d="M 220 250 L 320 180 L 480 180 L 580 250 L 480 320 L 320 320 Z" fill="none" stroke="url(#blueGrad)" stroke-width="2" />
    <line x1="320" y1="180" x2="320" y2="320" stroke="url(#purpleGrad)" stroke-width="1.5" />
    <line x1="480" y1="180" x2="480" y2="320" stroke="url(#blueGrad)" stroke-width="1.5" />
  </g>

  <!-- Stack Layer Cards -->
  <!-- 1. Frontend Layer -->
  <g transform="translate(140, 160)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#131d35" stroke="url(#blueGrad)" stroke-width="2" />
    <text x="80" y="32" fill="#00f2fe" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">FRONTEND</text>
    <text x="80" y="52" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle">React &amp; Next.js</text>
  </g>

  <!-- 2. Backend Layer -->
  <g transform="translate(320, 110)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#131d35" stroke="url(#purpleGrad)" stroke-width="2" />
    <text x="80" y="32" fill="#f355da" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">BACKEND API</text>
    <text x="80" y="52" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle">Node.js / Express</text>
  </g>

  <!-- 3. Database Layer -->
  <g transform="translate(500, 160)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#131d35" stroke="url(#blueGrad)" stroke-width="2" />
    <text x="80" y="32" fill="#00f2fe" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">DATABASE</text>
    <text x="80" y="52" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle">PostgreSQL / Mongo</text>
  </g>

  <!-- 4. DevOps / Cloud Layer -->
  <g transform="translate(320, 310)" filter="url(#glow)">
    <rect x="0" y="0" width="160" height="70" rx="10" fill="#131d35" stroke="url(#blueGrad)" stroke-width="2" />
    <text x="80" y="32" fill="#00f2fe" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">CLOUD HOST</text>
    <text x="80" y="52" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle">AWS / Cloud Services</text>
  </g>

  <!-- Decorative Orbits and Elements -->
  <circle cx="220" cy="250" r="6" fill="#00f2fe" filter="url(#glow)" />
  <circle cx="580" cy="250" r="6" fill="#f355da" filter="url(#glow)" />
  
  <!-- Floating tech particles -->
  <circle cx="240" cy="110" r="3" fill="#00f2fe" opacity="0.6" />
  <circle cx="560" cy="380" r="3" fill="#f355da" opacity="0.6" />
  <circle cx="150" cy="350" r="4" fill="#00f2fe" opacity="0.4" />
  <circle cx="650" cy="120" r="4" fill="#f355da" opacity="0.4" />
</svg>
